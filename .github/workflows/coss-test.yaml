name: Build Vector FreeBSD

on:
  workflow_dispatch:

jobs:
  build-freebsd:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install Rust toolchain with FreeBSD target
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-freebsd

      # 3. Cache cargo (important for Vector, speeds up a lot)
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # 4. Install build dependencies
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang build-essential pkg-config libssl-dev

      # 5. Build Vector for FreeBSD
      - name: Build Vector (FreeBSD target)
        run: |
          cargo build --release --target x86_64-unknown-freebsd

      # 6. Show result
      - name: List artifacts
        run: |
          ls -lah target/x86_64-unknown-freebsd/release/

      # 7. Upload binary
      - name: Upload Vector FreeBSD binary
        uses: actions/upload-artifact@v4
        with:
          name: vector-freebsd
          path: target/x86_64-unknown-freebsd/release/vector
